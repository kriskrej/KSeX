name: KSeX → Google Sheets sync

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */5 * * *"  # every 5 hours at :15 UTC

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore ./src/KsefSheetsSync/KsefSheetsSync.csproj

      - name: Preflight env
        shell: bash
        run: |
          missing=()
          check() { if [ -z "${!1}" ]; then missing+=("$1"); fi; }

          check GOOGLE_SERVICE_ACCOUNT_JSON_BASE64

          check COMPANY1_NAME
          check COMPANY1_NIP
          check COMPANY1_SPREADSHEET_ID
          if [ -z "${COMPANY1_KSEF_TOKEN}" ] && [ -z "${COMPANY1_REFRESH_TOKEN}" ]; then
            missing+=("COMPANY1_KSEF_TOKEN or COMPANY1_REFRESH_TOKEN")
          fi

          check COMPANY2_NAME
          check COMPANY2_NIP
          check COMPANY2_SPREADSHEET_ID
          if [ -z "${COMPANY2_KSEF_TOKEN}" ] && [ -z "${COMPANY2_REFRESH_TOKEN}" ]; then
            missing+=("COMPANY2_KSEF_TOKEN or COMPANY2_REFRESH_TOKEN")
          fi

          if [ "${#missing[@]}" -ne 0 ]; then
            echo "Missing required secrets:"
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_BASE64 }}
          COMPANY1_NAME: ${{ secrets.COMPANY1_NAME }}
          COMPANY1_NIP: ${{ secrets.COMPANY1_NIP }}
          COMPANY1_SPREADSHEET_ID: ${{ secrets.COMPANY1_SPREADSHEET_ID }}
          COMPANY1_KSEF_TOKEN: ${{ secrets.COMPANY1_KSEF_TOKEN }}
          COMPANY1_REFRESH_TOKEN: ${{ secrets.COMPANY1_REFRESH_TOKEN }}
          COMPANY2_NAME: ${{ secrets.COMPANY2_NAME }}
          COMPANY2_NIP: ${{ secrets.COMPANY2_NIP }}
          COMPANY2_SPREADSHEET_ID: ${{ secrets.COMPANY2_SPREADSHEET_ID }}
          COMPANY2_KSEF_TOKEN: ${{ secrets.COMPANY2_KSEF_TOKEN }}
          COMPANY2_REFRESH_TOKEN: ${{ secrets.COMPANY2_REFRESH_TOKEN }}
          LOOKBACK_DAYS: ${{ secrets.LOOKBACK_DAYS }}

      - name: Run sync
        run: dotnet run --project ./src/KsefSheetsSync/KsefSheetsSync.csproj --configuration Release
        env:
          LOOKBACK_DAYS: ${{ secrets.LOOKBACK_DAYS }}
          GOOGLE_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_BASE64 }}
          COMPANY1_NAME: ${{ secrets.COMPANY1_NAME }}
          COMPANY1_NIP: ${{ secrets.COMPANY1_NIP }}
          COMPANY1_SPREADSHEET_ID: ${{ secrets.COMPANY1_SPREADSHEET_ID }}
          COMPANY1_KSEF_TOKEN: ${{ secrets.COMPANY1_KSEF_TOKEN }}
          COMPANY1_REFRESH_TOKEN: ${{ secrets.COMPANY1_REFRESH_TOKEN }}
          COMPANY2_NAME: ${{ secrets.COMPANY2_NAME }}
          COMPANY2_NIP: ${{ secrets.COMPANY2_NIP }}
          COMPANY2_SPREADSHEET_ID: ${{ secrets.COMPANY2_SPREADSHEET_ID }}
          COMPANY2_KSEF_TOKEN: ${{ secrets.COMPANY2_KSEF_TOKEN }}
          COMPANY2_REFRESH_TOKEN: ${{ secrets.COMPANY2_REFRESH_TOKEN }}
